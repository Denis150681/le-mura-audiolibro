<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1000">
<title>Le Mura di Pietra e di Sangue — Audiolibro</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #0e0900;
    --bg-mid:    #1a1000;
    --bg-panel:  #120c00;
    --gold:      #c8972a;
    --gold-lt:   #e8b94a;
    --gold-dim:  #7a5c18;
    --gold-glow: rgba(200,151,42,0.18);
    --rust:      #8b3a1a;
    --cream:     #ede0b8;
    --cream-dim: #a89060;
    --ink:       #080500;
    --border:    rgba(200,151,42,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    font-family: 'IM Fell English', Georgia, serif;
    color: var(--cream);
    overflow: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 50%,  rgba(200,151,42,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 85% 20%,  rgba(139,58,26,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 85%,  rgba(200,151,42,0.05) 0%, transparent 50%);
  }

  /* Grain overlay */
  body::after {
    content: ''; position: fixed; inset: -50%; width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; animation: grain 10s steps(8) infinite; opacity: 0.6;
  }
  @keyframes grain {
    0%,100%{transform:translate(0,0)} 12%{transform:translate(-2%,-3%)} 25%{transform:translate(3%,1%)}
    37%{transform:translate(-1%,2%)} 50%{transform:translate(2%,-1%)} 62%{transform:translate(-3%,3%)}
    75%{transform:translate(1%,-2%)} 87%{transform:translate(-2%,1%)}
  }

  /* ── LAYOUT ── */
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 1; }

  /* ── HEADER ── */
  #header {
    flex-shrink: 0;
    padding: 14px 52px 10px;
    background: linear-gradient(180deg, rgba(5,3,0,0.96) 0%, rgba(8,5,0,0.75) 100%);
    border-bottom: 1px solid var(--border);
    text-align: center;
    position: relative;
  }
  .header-sword {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    color: var(--gold-dim); font-size: 20px; opacity: 0.5;
    animation: flicker-slow 4s ease-in-out infinite;
  }
  .btn-menu-top {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--gold-dim);
    font-size: 24px; cursor: pointer; padding: 4px; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
  }
  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(11px, 3.2vw, 17px);
    color: var(--gold);
    letter-spacing: 0.07em; line-height: 1.2;
    text-shadow: 0 0 24px rgba(200,151,42,0.35);
  }
  .title-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(8px, 2.2vw, 11px);
    color: var(--cream-dim);
    letter-spacing: 0.14em; margin-top: 3px; font-style: italic;
  }

  /* ── CHAPTER PANEL ── */
  #chapter-panel {
    position: fixed; inset: 0; z-index: 100;
    display: none; flex-direction: column;
    background: rgba(4,2,0,0.97);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #chapter-panel.open { display: flex; animation: slideIn .22s ease; }
  @keyframes slideIn { from{transform:translateX(-100%);opacity:0} to{transform:translateX(0);opacity:1} }

  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(4,2,0,0.99); z-index: 1;
  }
  .panel-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; }
  .btn-close {
    background: none; border: 1px solid var(--gold-dim);
    color: var(--gold); width: 34px; height: 34px; border-radius: 50%;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .ch-list { padding: 14px; display: flex; flex-direction: column; gap: 7px; }
  .ch-item {
    padding: 13px 15px; border: 1px solid rgba(200,151,42,0.18);
    border-radius: 4px; cursor: pointer; transition: all .18s;
    background: rgba(200,151,42,0.02); position: relative; overflow: hidden;
  }
  .ch-item:active { background: rgba(200,151,42,0.1); }
  .ch-item.active { border-color: var(--gold); background: rgba(200,151,42,0.08); }
  .ch-item.active::before { content:''; position:absolute; left:0;top:0;bottom:0; width:3px; background:var(--gold); }
  .ch-item.has-audio::after {
    content: '🔊'; position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%); font-size: 13px; opacity: 0.7;
  }
  .ci-num { font-family:'Cinzel',serif; font-size:9px; color:var(--gold-dim); letter-spacing:.2em; text-transform:uppercase; margin-bottom:3px; }
  .ci-title { font-size:14px; color:var(--cream); line-height:1.3; }
  .ci-year { font-size:10px; color:var(--cream-dim); font-style:italic; margin-top:2px; }
  .ci-status { font-size:10px; color:var(--gold-dim); font-style:italic; margin-top:3px; }

  /* ── READER ── */
  #reader { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
  #text-content { padding:22px 20px 40px; max-width:680px; margin:0 auto; min-height:100%; }

  .ch-heading {
    text-align:center; margin-bottom:26px; padding-bottom:18px;
    border-bottom:1px solid rgba(200,151,42,0.18); position:relative;
  }
  .ch-heading::after {
    content:'◆'; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
    color:var(--gold-dim); font-size:11px; background:var(--bg); padding:0 8px;
  }
  .ch-heading .lbl { font-family:'Cinzel',serif; font-size:10px; letter-spacing:.3em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:7px; }
  .ch-heading h1 { font-family:'Cinzel Decorative',serif; font-size:clamp(15px,4.8vw,23px); color:var(--gold); line-height:1.3; text-shadow:0 0 28px rgba(200,151,42,0.28); margin-bottom:5px; }
  .ch-heading .yr { font-style:italic; color:var(--cream-dim); font-size:13px; }

  .para {
    font-size: clamp(16px, 4.2vw, 18px);
    line-height: 1.88; color: var(--cream);
    margin-bottom: 1.35em;
    padding: 3px 5px; margin-left: -5px; margin-right: -5px;
    border-radius: 3px; transition: background .25s, color .25s;
  }
  .para.speaking { background: rgba(200,151,42,0.13); color: #fff; }
  .para.dialogue { color: #f0e4c0; padding-left: 14px; border-left: 1px solid rgba(200,151,42,0.28); }
  .para.drop-cap::first-letter {
    font-family: 'Cinzel Decorative', serif; font-size: 4em;
    float: left; line-height: 0.75; padding-right: 7px; padding-top: 5px;
    color: var(--gold); text-shadow: 0 0 18px rgba(200,151,42,0.45);
  }

  /* Audio-not-loaded notice per chapter */
  .audio-missing-notice {
    display: flex; align-items: center; gap: 10px;
    background: rgba(200,151,42,0.06); border: 1px dashed var(--gold-dim);
    border-radius: 5px; padding: 12px 14px; margin-bottom: 22px;
    font-size: 13px; color: var(--cream-dim); font-style: italic; line-height: 1.5;
  }
  .audio-missing-notice .ico { font-size: 20px; flex-shrink: 0; }

  /* ── PLAYER ── */
  #player {
    flex-shrink: 0;
    background: linear-gradient(0deg, rgba(3,2,0,0.99) 0%, rgba(12,8,0,0.96) 100%);
    border-top: 1px solid var(--border);
    padding: 9px 14px 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

  /* Progress */
  .prog-wrap {
    position: relative; height: 3px; background: rgba(200,151,42,0.12);
    border-radius: 2px; margin-bottom: 10px; cursor: pointer;
  }
  #prog-bar {
    height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px; width: 0%; transition: width .25s linear; position: relative;
  }
  #prog-bar::after {
    content:''; position:absolute; right:-5px; top:-4px;
    width:11px; height:11px; background:var(--gold); border-radius:50%;
    box-shadow: 0 0 10px rgba(200,151,42,0.9);
    opacity: 0; transition: opacity .2s;
  }
  .prog-wrap:hover #prog-bar::after { opacity: 1; }

  /* Time */
  .time-row { display:flex; justify-content:space-between; margin-bottom:8px; }
  .time-txt { font-family:'Cinzel',serif; font-size:9px; letter-spacing:.1em; color:var(--gold-dim); }

  /* Player row */
  .player-row { display:flex; align-items:center; gap:10px; }
  .p-info { flex:1; min-width:0; }
  .p-lbl { font-family:'Cinzel',serif; font-size:8px; letter-spacing:.2em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:2px; }
  .p-title { font-size:12px; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-style:italic; }
  .p-mode { font-size:10px; color:var(--gold-dim); margin-top:1px; font-style:italic; }

  .controls { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .btn-c {
    background:none; border:none; cursor:pointer;
    color:var(--cream-dim); font-size:17px;
    width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    transition: all .12s;
  }
  .btn-c:active { background:rgba(200,151,42,0.14); color:var(--gold); }

  .btn-play {
    width:50px; height:50px; border-radius:50%;
    background: conic-gradient(var(--gold) var(--play-prog, 0%), rgba(200,151,42,0.15) 0%);
    color:var(--ink); font-size:22px;
    box-shadow: 0 0 22px rgba(200,151,42,0.28), 0 3px 10px rgba(0,0,0,0.55);
    transition: all .15s; position: relative;
  }
  .btn-play::before {
    content:''; position:absolute; inset:3px; border-radius:50%;
    background: linear-gradient(135deg, #7a5c18, #c8972a);
  }
  .btn-play span { position:relative; z-index:1; }
  .btn-play:active { transform:scale(0.92); }

  .btn-spd {
    background:none; border:1px solid var(--gold-dim);
    color:var(--gold-dim); font-family:'Cinzel',serif;
    font-size:9px; letter-spacing:.05em;
    padding:4px 6px; border-radius:3px; cursor:pointer;
    min-width:34px; height:auto; transition: all .15s;
  }
  .btn-spd:active { border-color:var(--gold); color:var(--gold); background:rgba(200,151,42,0.1); }

  /* Playing dot */
  .play-dot {
    width:5px; height:5px; border-radius:50%; background:var(--gold);
    box-shadow:0 0 7px var(--gold); flex-shrink:0;
    display:none; animation:flicker 1.8s ease-in-out infinite;
  }
  .play-dot.on { display:block; }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.7} }
  @keyframes flicker-slow { 0%,100%{opacity:.5} 50%{opacity:.8} }

  /* ── SPLASH ── */
  #splash {
    position:fixed; inset:0; z-index:200;
    background: radial-gradient(ellipse at 50% 40%, #1a1000 0%, #080500 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 32px;
    transition: opacity .6s, transform .6s;
  }
  #splash.out { opacity:0; pointer-events:none; transform:scale(.96); }

  .sp-sword { font-size:52px; margin-bottom:20px; animation:glow-pulse 3s ease-in-out infinite; }
  @keyframes glow-pulse {
    0%,100%{text-shadow:0 0 20px rgba(200,151,42,.35)}
    50%{text-shadow:0 0 45px rgba(200,151,42,.8),0 0 80px rgba(200,151,42,.25)}
  }
  .sp-title { font-family:'Cinzel Decorative',serif; font-size:clamp(19px,6vw,34px); color:var(--gold); line-height:1.22; margin-bottom:10px; text-shadow:0 0 30px rgba(200,151,42,.35); }
  .sp-sub { font-family:'IM Fell English',serif; font-style:italic; color:var(--cream-dim); font-size:clamp(13px,3.8vw,16px); margin-bottom:6px; }
  .sp-line { width:70px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin:16px auto; }
  .sp-auth { font-family:'Cinzel',serif; letter-spacing:.22em; color:var(--gold-dim); font-size:clamp(10px,2.8vw,13px); margin-bottom:36px; text-transform:uppercase; }
  .btn-start {
    background:linear-gradient(135deg,var(--gold-dim),var(--gold));
    color:var(--ink); border:none; font-family:'Cinzel',serif;
    font-size:13px; letter-spacing:.2em; text-transform:uppercase;
    padding:14px 38px; border-radius:3px; cursor:pointer;
    box-shadow:0 0 30px rgba(200,151,42,.28),0 4px 14px rgba(0,0,0,.5);
    transition: all .18s;
  }
  .btn-start:active { transform:scale(.95); }

  /* Scrollbar */
  #reader::-webkit-scrollbar{width:3px}
  #reader::-webkit-scrollbar-track{background:transparent}
  #reader::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
</style>
</head>

    audio: 'Il figlio del fabbro.mp3',
    paragraphs: [
      {type:'prose',text:"Il martello cadeva ritmico sull'incudine come il battito di un cuore antico, e Milo conosceva quel suono prima ancora di conoscere il proprio nome. Suo padre, Corrado, fabbro di mani grandi e schiena curva, aveva forgiato per trent'anni i ferri di cavallo, i chiodi, le lame da cucina e i cardini delle porte di mezza città. La sua bottega sorgeva a ridosso delle mura lignee, là dove il profumo di legno bruciato si mescolava a quello della terra umida e del letame delle stalle vicine."},
      {type:'prose',text:"Milo aveva quattordici anni e un ciuffo di capelli scuri che nessun pettine riusciva a domare. Era magro come un ramo di salice, ma le braccia, già indurite dal lavoro del mantice e dall'aiuto quotidiano al padre, tradivano una forza che i coetanei gli invidiavano in silenzio. Aveva gli occhi chiari, del colore del cielo d'inverno, e uno sguardo che gli anziani del borgo dicevano essere troppo serio per un ragazzo della sua età."},
      {type:'dialogue',text:"— Milo! — chiamò Corrado dalla bottega, senza alzare gli occhi dal ferro che teneva con le tenaglie. — Hai portato l'acqua?"},
      {type:'dialogue',text:"— Arrivo, padre."},
      {type:'prose',text:"Il ragazzo sollevò il secchio dal pozzo nel cortile e lo trascinò dentro, dove il calore del fuoco trasformava l'aria in qualcosa di quasi solido. La bottega era piccola ma ordinata: gli attrezzi appesi alle pareti con cura certosina, i pezzi finiti allineati su una mensola di quercia, le braci sempre vive nel grande focolare centrale."},
      {type:'prose',text:"Corrado prese il secchio senza una parola e lo usò per temperare il ferro. Un sibilo, una nuvola di vapore bianco, e poi il silenzio, rotto solo dal crepitio delle braci."},
      {type:'dialogue',text:"— Domani — disse il padre, appoggiando il martello — vieni con me dal capitano delle guardie. Hanno bisogno di un garzone che sappia affilare le spade. Sei pronto?"},
      {type:'prose',text:"Milo sentì qualcosa muoversi nel petto. Non era paura. Era qualcosa di più grande e indefinito, come l'odore dell'aria prima di un temporale."},
      {type:'dialogue',text:"— Sono pronto — rispose."},
      {type:'prose',text:"Corrado lo guardò per un lungo momento, con quegli occhi stanchi che avevano visto troppe stagioni di fatica. Poi annuì, come se avesse ricevuto la risposta giusta a una domanda che non aveva mai fatto ad alta voce."},
      {type:'prose',text:"Quella notte, Milo salì sul tetto della bottega come faceva spesso quando non riusciva a dormire. Da lassù si vedevano le mura di legno che cingevano Montagnana, alte e scure contro il cielo stellato. Torce ardevano sulle torri di guardia, piccole fiamme tremanti nel vento che saliva dalla pianura."},
      {type:'prose',text:"La città dormiva. Le case erano silenziose, i vicoli deserti. Da qualche parte un cane abbaiava lontano, e poi anche quello tacque."},
      {type:'prose',text:"Milo fissò l'orizzonte verso nord, dove dicevano che vivesse il signore da Romano, colui del quale i mercanti parlavano sottovoce nelle taverne, abbassando gli occhi come se il solo nominarlo potesse portare sventura. Ezzelino. Il nome aveva il suono di una lama che scivola nel fodero."},
      {type:'prose',text:"Il ragazzo non sapeva ancora che di lì a poco quel nome avrebbe cambiato ogni cosa. Che quelle mura di legno che gli sembravano così solide e eterne sarebbero diventate cenere in una sola notte. Che lui, Milo, figlio di un fabbro, avrebbe dovuto scegliere se fuggire o restare a combattere per una città che non aveva ancora capito fino in fondo di amare."},
      {type:'prose',text:"Per ora c'era solo la notte, le torce sulle mura, e quel senso strano nel petto che assomigliava al coraggio ma poteva anche essere soltanto la paura di ciò che non si conosce ancora."},
      {type:'prose',text:"Si addormentò sul tetto, avvolto nel mantello di lana grezza, con le stelle sopra di lui e le mura intorno, ignaro di quanto poco tempo restasse alla pace."}
    ]
  },
  {
    id: 2, num: 'Capitolo II', title: 'La notte di fuoco',
    year: 'Montagnana, 25 marzo 1242',
    audio: 'La notte di fuoco.mp3',
    paragraphs: [
      {type:'prose',text:"Milo non dormiva bene da tre notti."},
      {type:'prose',text:"C'era qualcosa nell'aria di quei giorni, qualcosa che i cani sentivano prima degli uomini e che faceva irrequieti i cavalli nelle stalle. I mercanti che arrivavano da Verona parlavano poco e mangiavano in fretta, con gli occhi che correvano verso la porta delle taverne come se aspettassero qualcuno che non doveva trovarli lì. Le guardie sulle mura erano state raddoppiate, e il capitano Rinaldo, uomo di poche parole e molta esperienza, aveva smesso di sorridere del tutto."},
      {type:'prose',text:"Milo era diventato il garzone degli armigeri da quasi due anni. Affilava spade, lucidava elmi, portava messaggi da una torre all'altra. Conosceva ormai ogni pietra delle mura, ogni crepa nel legno dei camminamenti, ogni guardia per nome. Aveva sedici anni e si sentiva già un soldato, anche se non aveva ancora impugnato una spada in battaglia."},
      {type:'prose',text:"Quella notte era di turno con il vecchio Bertone, una guardia dalla barba grigia e le gambe storte che aveva combattuto contro i Veronesi vent'anni prima e da allora non aveva più smesso di raccontarlo."},
      {type:'dialogue',text:"— Stai fermo — borbottò Bertone, senza alzare gli occhi dalla coppa di vino che stringeva tra le mani nodose. — Cammini avanti e indietro come un'anima in pena."},
      {type:'dialogue',text:"— C'è qualcosa — disse Milo, fermandosi sulla torre di guardia e fissando l'oscurità della pianura. — Non sentite?"},
      {type:'dialogue',text:"— Sento il vento."},
      {type:'dialogue',text:"— No. Sotto il vento. Come un rumore di terra che si muove."},
      {type:'prose',text:"Bertone alzò finalmente gli occhi. Strinse le labbra. Poi si alzò lentamente, con uno scricchiolio delle ginocchia, e si avvicinò al bordo della torre."},
      {type:'prose',text:"Il silenzio era strano. Troppo pieno."},
      {type:'prose',text:"Fu allora che apparve la prima luce. Non sulla strada, non dove ci si aspettava un viandante o una torcia. Apparve ai margini della pianura, bassa e arancione, e poi un'altra, e un'altra ancora, finché l'orizzonte non sembrò prendere fuoco tutto insieme."},
      {type:'dialogue',text:"— Alla guardia! — urlò Bertone con una voce che Milo non gli aveva mai sentito prima, una voce giovane e disperata che sembrava appartenere a un altro uomo. — Alla guardia! Nemici!"},
      {type:'prose',text:"Montagnana si svegliò nel caos."},
      {type:'prose',text:"Le campane cominciarono a suonare tutte insieme, un suono caotico e disperato che rimbalzava tra i tetti e le mura. Le donne afferrarono i bambini, gli uomini cercarono le armi, i preti corsero verso le chiese. Milo scese dalla torre di corsa, inciampò sui gradini, si rialzò, raggiunse la postazione delle armi dove il capitano Rinaldo stava già distribuendo spade e archi con la rapidità di chi ha preparato quel momento mille volte nella mente."},
      {type:'dialogue',text:"— Ragazzo! — gli gridò Rinaldo, lanciandogli una spada corta. — Stai vicino alle mura. Non eroismo, hai capito? Stai vicino alle mura e fai quello che ti dico."},
      {type:'prose',text:"Milo annuì, stringendo l'impugnatura con una mano che non tremava, o almeno così si disse."},
      {type:'prose',text:"Le schiere di Ezzelino avanzavano nella notte come un'onda scura. Veronesi, tedeschi, saraceni — uomini di ogni terra uniti sotto il gonfalone del Romano. Le loro torce formavano un serpente di fuoco che si snodava dalla pianura verso le mura di Montagnana, e il rumore dei loro passi era ora chiaramente udibile, un rombo sordo e continuo come tuono lontano."},
      {type:'prose',text:"Poi arrivarono le frecce infuocate."},
      {type:'prose',text:"La prima cadde sul tetto di una casa vicino alle mura e prese fuoco in un istante, come se il legno aspettasse solo quella scintilla. La seconda cadde sul camminamento. La terza, la quarta, la quinta — una pioggia di fuoco che trasformò la notte in qualcosa di infernale."},
      {type:'dialogue',text:"— Le mura bruciano! — urlò qualcuno."},
      {type:'dialogue',text:"— Tenete le posizioni! — rispose Rinaldo, ma la sua voce si perdeva nel crepitio delle fiamme e nelle grida della gente."},
      {type:'prose',text:"Milo si trovò a combattere quasi senza accorgersene. Un soldato nemico aveva scavalcato una sezione di mura già indebolita dal fuoco e si era calato nel vicolo sottostante. Era un uomo grande, con l'elmo calato sugli occhi e una mazza in pugno. Si guardarono per un istante che sembrò lunghissimo."},
      {type:'prose',text:"Poi l'uomo alzò la mazza e Milo si scansò di lato, per puro istinto, sentendo il vento del colpo sfiorargli la spalla. Contrattaccò senza pensare, con un gesto che aveva visto fare mille volte agli armigeri durante gli addestramenti, e la lama colpì il fianco dell'avversario. Non abbastanza da uccidere, ma abbastanza da farlo indietreggiare."},
      {type:'prose',text:"Un altro soldato arrivò alle spalle del primo e Milo capì che stava per finire male, quando una voce tonante gridò il suo nome e il capitano Rinaldo si abbatté sui due nemici con la furia di chi non ha più niente da perdere."},
      {type:'dialogue',text:"— Ho detto vicino alle mura, non in mezzo al nemico! — urlò Rinaldo, senza smettere di combattere."},
      {type:'prose',text:"La notte durò un'eternità."},
      {type:'prose',text:"Quando l'alba cominciò a tingere il cielo di un grigio sporco, Montagnana era in fiamme per metà. Le mura di legno che avevano protetto la città per generazioni erano ridotte a tratti anneriti e fumanti. Il marchese Azzo VII d'Este, colto di sorpresa nella notte, era fuggito prima dell'alba per non cadere prigioniero. E Ezzelino III da Romano era entrato in città come un padrone che prende possesso di ciò che considera già suo."},
      {type:'prose',text:"Milo era seduto sui gradini di una casa ancora in piedi, con un taglio sul braccio che qualcuno aveva bendato senza che lui se ne accorgesse, e guardava il fumo alzarsi verso il cielo mattutino. Accanto a lui, Bertone stringeva ancora la sua coppa vuota, gli occhi fissi sulle rovine fumanti delle mura."},
      {type:'dialogue',text:"— E adesso? — chiese Milo sottovoce."},
      {type:'prose',text:"Il vecchio soldato non rispose subito. Guardò le fiamme, guardò i soldati nemici che pattugliavano i vicoli, guardò il gonfalone del Romano che qualcuno aveva già issato sulla torre più alta."},
      {type:'dialogue',text:"— Adesso — disse infine Bertone, con una voce che non aveva più niente del vecchio brontolone delle notti di guardia — adesso impariamo a sopravvivere. E aspettiamo."},
      {type:'dialogue',text:"— Aspettiamo cosa?"},
      {type:'prose',text:"Il vecchio si alzò a fatica, le ginocchia scricchiolanti come sempre, e guardò Milo con occhi che avevano visto troppe città cadere e troppe città risorgere."},
      {type:'dialogue',text:"— Il momento giusto — disse semplicemente. — Viene sempre. Per chi ha la pazienza di aspettarlo."},
      {type:'prose',text:"Montagnana era caduta. Ma Milo, figlio del fabbro, era ancora vivo. E dentro di lui, sotto la stanchezza e il dolore e la paura, qualcosa di duro e ostinato si era posato nel petto come una pietra nel fondo di un fiume."},
      {type:'prose',text:"Non era ancora coraggio. Ma ci assomigliava."}
    ]
  },
  {
    id: 3, num: 'Capitolo III', title: 'Il Tiranno',
    year: 'Montagnana, primavera 1242',
    audio: 'Il tiranno.mp3',
    paragraphs: [
      {type:'prose',text:"Ezzelino III da Romano non era come Milo se lo era immaginato."},
      {type:'prose',text:"Nelle notti passate sulle torri di guardia, ascoltando i mercanti che parlavano sottovoce nelle taverne, il ragazzo si era costruito nella mente un mostro. Qualcosa di enorme e deforme, con gli occhi di brace e la voce del tuono. Un orco da leggenda, come quelli che le nonne raccontavano ai bambini per tenerli lontani dai boschi."},
      {type:'prose',text:"L'uomo che vide entrare in città la mattina dopo l'incendio era invece di statura media, asciutto, con i capelli scuri striati di grigio e una barba curata. Cavalcava un cavallo nero senza fronzoli né decorazioni eccessive. Indossava una veste da viaggio ancora polverosa, come se la battaglia della notte precedente fosse stata per lui una faccenda ordinaria, una di quelle cose che si fanno e si archiviano senza troppo pensiero."},
      {type:'prose',text:"Ma erano gli occhi che colpivano."},
      {type:'prose',text:"Milo lo vide passare dalla stradina laterale dove si era nascosto con Bertone e altri tre soldati sopravvissuti. Gli occhi di Ezzelino erano scuri e immobili, con uno sguardo che non si posava sulle cose ma le attraversava, come se ciò che vedeva fosse già stato valutato, pesato e classificato prima ancora di essere guardato davvero. Non erano occhi crudeli nel senso che Milo aveva immaginato. Erano qualcosa di peggio: erano occhi indifferenti."},
      {type:'dialogue',text:"— Non muoverti — soffiò Bertone all'orecchio del ragazzo, stringendogli il braccio con una mano che aveva la forza di una morsa."},
      {type:'prose',text:"Milo non si mosse. Trattenne il fiato mentre il corteo passava a pochi metri da loro. Soldati a cavallo, portabandiera con il gonfalone del Romano, un gruppo di consiglieri in veste scura che camminavano a piedi accanto al signore. E poi, in coda, una fila silenziosa di prigionieri legati con corde alle selle dei cavalli."},
      {type:'prose',text:"Tra loro, Milo riconobbe il fornaio della piazza, un uomo di quarant'anni che aveva sempre distribuito pane avanzato ai bambini poveri del borgo. Camminava a testa alta, con un taglio sulla fronte ancora fresco, ma senza tremare."},
      {type:'prose',text:"Qualcosa si contrasse nel petto di Milo come un pugno chiuso."},
      {type:'prose',text:"Nei giorni che seguirono, Montagnana imparò il significato della parola conquista."},
      {type:'prose',text:"Ezzelino non era un signore che urlava e distruggeva per il gusto di farlo. Era peggio: era metodico. Nelle prime settimane fece censire ogni casa, ogni bottega, ogni granaio. Impose tributi precisi, né eccessivi né clementi, calcolati con la fredda logica di chi conosce il confine oltre il quale i popoli si ribellano per fame e quello prima del quale si rassegnano per abitudine. Nominò un podestà di sua fiducia, un uomo di Verona di nome Aldrovando, che amministrava la giustizia con efficienza e senza pietà."},
      {type:'prose',text:"Chi obbediva veniva lasciato in pace. Chi resisteva spariva."},
      {type:'prose',text:"La bottega di Corrado fu requisita per produrre ferri di cavallo e punte di lancia per le truppe del Romano. Il padre di Milo lavorava adesso per il nemico, con le stesse mani con cui aveva forgiato i ferri per i soldati di Montagnana. Non disse niente, la prima mattina che aprì la bottega sotto il nuovo regime. Accese il fuoco, prese il martello, e cominciò a battere il ferro come sempre. Ma la sera, quando si sedeva a tavola, restava in silenzio per un tempo così lungo che sembrava aver dimenticato come si parlava."},
      {type:'prose',text:"Milo aveva capito presto che la sopravvivenza richiedeva una doppia vita."},
      {type:'prose',text:"Di giorno faceva il garzone, come prima, ma adesso per le truppe di Ezzelino. Portava messaggi, affilava lame, teneva in ordine le stalle del presidio militare che era stato installato nell'edificio più grande della piazza. Era bravo nel rendersi invisibile, nel muoversi senza farsi notare, nel rispondere alle domande con parole neutre che non rivelavano niente. I soldati lo ignoravano, come si ignorano i mobili e le sedie."},
      {type:'prose',text:"Di notte, invece, si incontrava con Bertone e con un gruppo ristretto di uomini nel retrobottega di un calzolaio di nome Fante, un ometto quieto con le dita sempre macchiate di cera che si rivelò essere tra i più coraggiosi che Milo avesse mai conosciuto. Si riunivano al buio, parlavano sottovoce, raccoglievano informazioni. Quante truppe nel presidio. Dove erano i depositi di armi. Come cambiavano i turni di guardia."},
      {type:'prose',text:"Non avevano ancora un piano. Ma raccoglievano pezzi, come si raccolgono sassi prima di costruire un muro."},
      {type:'prose',text:"Fu in una di quelle notti che Milo vide per la seconda volta Ezzelino da vicino."},
      {type:'prose',text:"Stava attraversando il cortile del presidio con un messaggio per il capitano delle guardie quando sentì delle voci nella stanza dei consigli, la porta socchiusa. Si fermò per istinto, appiattendosi contro il muro."},
      {type:'dialogue',text:"— I lavori sul mastio procedono? — era la voce di Ezzelino, bassa e precisa come il ticchettio di un orologio."},
      {type:'dialogue',text:"— Procederanno più veloci se avremo altri uomini, Signore."},
      {type:'dialogue',text:"— Allora prendete gli uomini che vi servono. — Una pausa. — Montagnana deve diventare inespugnabile. Non voglio che ciò che è caduto una volta possa cadere di nuovo. Il castello sarà la nostra rocca in queste terre. Alto, solido, visibile da ogni angolo della pianura. Affinché chiunque guardi queste mura sappia che il Romano è qui e che il Romano resta."},
      {type:'dialogue',text:"— E la popolazione?"},
      {type:'dialogue',text:"— La popolazione lavora. Questo è tutto quello che deve fare."},
      {type:'prose',text:"Milo rimase immobile ancora qualche secondo dopo che le voci erano riprese su altri argomenti, poi si allontanò silenzioso nel buio del cortile. Aveva il cuore che batteva forte, non di paura ma di qualcosa di diverso, qualcosa che somigliava alla rabbia ma era più freddo, più duraturo."},
      {type:'prose',text:"Capiva adesso cosa significava davvero essere conquistati. Non era solo il fuoco della notte dell'attacco, non era solo la paura e il sangue. Era questo: essere ridotti a forza lavoro, a ingranaggi in una macchina che altri governavano. Essere lasciati in pace finché si era utili, e rimossi quando si smetteva di esserlo."},
      {type:'prose',text:"Quella notte, tornando a casa attraverso i vicoli bui, Milo si fermò un momento davanti alle mura bruciate. I tratti anneriti si stagliavano contro il cielo notturno come denti rotti, testimoni silenziosi di ciò che era stato. Da qualche parte, oltre quelle mura, la pianura si stendeva libera e silenziosa verso orizzonti che lui non aveva ancora visto."},
      {type:'prose',text:"Pensò al fornaio della piazza, che aveva visto tra i prigionieri. Pensò a suo padre che batteva il ferro in silenzio. Pensò agli occhi indifferenti di Ezzelino."},
      {type:'prose',text:"E pensò alle parole di Bertone: il momento giusto viene sempre, per chi ha la pazienza di aspettarlo."},
      {type:'dialogue',text:"— Aspetto — disse sottovoce, a nessuno e a tutti. — Ma non dimentico."},
      {type:'prose',text:"Le stelle non risposero. Ma le mura bruciate sembravano ascoltare, e nel loro silenzio c'era qualcosa che assomigliava a una promessa."}
    ]
  },
  {
    id: 4, num: 'Capitolo IV', title: 'La Resistenza',
    year: 'Montagnana, autunno 1242',
    audio: 'La resistenza.mp3',
    paragraphs: [
      {type:'prose',text:"Il momento giusto non arrivò in autunno."},
      {type:'prose',text:"Non arrivò nemmeno in inverno, quando la nebbia scendeva sulla pianura come un sudario e i soldati di Ezzelino si stringevano attorno ai fuochi del presidio, brontolando in dialetti che nessuno capiva. Non arrivò in primavera, quando la terra si svegliava e i campi richiedevano braccia che il Romano continuava a sottrarre ai contadini per i lavori di costruzione del mastio."},
      {type:'prose',text:"Ma in quei mesi di attesa, qualcosa cresceva sotto la superficie di Montagnana come radici sotto la neve. Silenziosa, ostinata, invisibile."},
      {type:'prose',text:"Il gruppo di Fante il calzolaio si era allargato con cautela, un uomo alla volta, scelti con la lentezza e la cura con cui si sceglie il ferro per una lama importante. C'era Simone il mugnaio, un uomo enorme con le mani bianche di farina e una memoria prodigiosa che ricordava ogni movimento delle truppe come se le avesse scritte su pergamena. C'era la vedova Agnese, che nessuno avrebbe sospettato perché portava ogni giorno il pane caldo al presidio e sorrideva ai soldati con la devozione di una madre, raccogliendo nel frattempo informazioni che valevano oro. C'era il giovane prete don Ilario, che usava il confessionale come luogo di raccolta notizie con una disinvoltura che avrebbe scandalizzato il vescovo."},
      {type:'prose',text:"E c'era Milo, che era diventato nel frattempo gli occhi e le gambe del gruppo. Conosceva ogni vicolo, ogni passaggio segreto, ogni momento in cui le guardie erano distratte o assonnate. Si muoveva nella città conquistata come un'ombra con gli occhi aperti."},
      {type:'prose',text:"Una sera di fine estate, Bertone lo chiamò in disparte con un'aria che Milo non gli aveva mai visto."},
      {type:'dialogue',text:"— Ho ricevuto notizie — disse il vecchio sottovoce, guardandosi intorno con gli occhi che aveva sviluppato nei decenni di guardia, quegli occhi che vedevano i pericoli anche dove non ce n'erano. — Da Padova. Ci sono uomini che si organizzano. I guelfi non hanno dimenticato. E il marchese d'Este non ha dimenticato Montagnana."},
      {type:'dialogue',text:"— Vengono? — chiese Milo, sentendo qualcosa accendersi nel petto."},
      {type:'dialogue',text:"— Non ancora. Ma vogliono sapere se dentro le mura ci sono ancora uomini capaci di combattere."},
      {type:'prose',text:"Si guardarono in silenzio per un momento."},
      {type:'dialogue',text:"— E noi cosa rispondiamo? — chiese Milo."},
      {type:'prose',text:"Bertone sorrise per la prima volta da mesi. Era un sorriso storto, consumato, ma autentico."},
      {type:'dialogue',text:"— Rispondiamo di sì."},
      {type:'prose',text:"Nei mesi che seguirono, Milo divenne qualcosa che non aveva parole precise per definire. Non era ancora un comandante, non aveva l'età né il titolo. Ma era diventato il punto di collegamento tra il gruppo di Fante e il mondo esterno, il filo sottile che teneva insieme la rete di resistenza che si stava tessendo nell'ombra."},
      {type:'prose',text:"Imparò a portare messaggi nascosti nei doppi fondi dei cestini del pane, nelle suole delle scarpe, nelle pieghe delle vesti. Imparò a leggere il comportamento delle guardie come si legge il tempo dal colore del cielo. Imparò che il coraggio non era l'assenza di paura ma la capacità di muoversi nonostante essa, di fare il passo successivo anche quando le ginocchia volevano fermarsi."},
      {type:'prose',text:"Commise anche errori."},
      {type:'prose',text:"Il peggiore accadde in una mattina di ottobre, quando fu fermato da una pattuglia di soldati tedeschi al mercato. Aveva con sé un messaggio per un contatto fuori le mura, nascosto nella fodera del mantello. Uno dei soldati, un uomo alto con gli occhi chiari e un naso spezzato, lo guardò con quella particolare attenzione che i soldati esperti riservano alle cose che non tornano."},
      {type:'dialogue',text:"— Dove vai, ragazzo?"},
      {type:'dialogue',text:"— Al mercato, messere. Per mio padre il fabbro. — La voce uscì ferma, Milo ne fu quasi sorpreso. — Ha bisogno di carbone."},
      {type:'prose',text:"Il soldato lo fissò ancora qualche secondo. Poi scosse la testa e fece cenno agli altri di proseguire."},
      {type:'prose',text:"Milo camminò fino al banco del carbonaio con un passo regolare, comprò il carbone che non serviva a nessuno, e tornò verso casa senza correre. Solo quando fu nel vicolo dietro la bottega di suo padre si fermò contro il muro, chiuse gli occhi, e lasciò che le mani tremassero quanto volevano."},
      {type:'prose',text:"Poi le aprì, le guardò, e aspettò che smettessero di tremare."},
      {type:'prose',text:"Ci vollero pochi minuti. Ne era contento."},
      {type:'prose',text:"L'inverno portò con sé qualcosa di inaspettato: la costruzione del mastio procedeva a ritmo serrato, e Ezzelino aveva requisito altri uomini per i lavori, tra cui diversi del gruppo di Fante. Fu una perdita e un'opportunità insieme."},
      {type:'prose',text:"Perdita, perché quegli uomini erano esausti e sorvegliati. Opportunità, perché lavorando sulla torre impararono ogni segreto della sua costruzione. Le scale retrattili, i solai di legno, i punti dove le mura erano più spesse e quelli dove erano più sottili. L'ingresso sopraelevato che rendeva la torre difficile da prendere dall'esterno ma anche difficile da abbandonare in fretta dall'interno."},
      {type:'dialogue',text:"— Se mai dovessimo riprendere la città — disse Simone il mugnaio una sera, tracciando con un dito nella farina sparsa sul tavolo una rozza pianta della torre — dovremo cominciare da lì. Chi controlla il mastio controlla Montagnana."},
      {type:'dialogue',text:"— Prima dobbiamo sopravvivere fino ad allora — disse Agnese la vedova, con il pragmatismo asciutto che la caratterizzava."},
      {type:'dialogue',text:"— Sopravviviamo — disse Milo. — E impariamo. Ogni giorno impariamo qualcosa che potrebbe servirci."},
      {type:'prose',text:"Don Ilario annuì lentamente, intrecciando le dita come in preghiera."},
      {type:'dialogue',text:"— C'è una cosa che ho sentito in confessione — disse, con il tono di chi sa di muoversi su un terreno delicato. — Non posso rivelare i nomi. Ma posso dire che non siamo soli quanto pensiamo. Dentro le mura, anche tra chi sembra servire il Romano senza riserve, ci sono cuori che aspettano."},
      {type:'dialogue',text:"— Aspettano cosa? — chiese Bertone."},
      {type:'dialogue',text:"— Lo stesso che aspettiamo noi — disse il prete. — Qualcuno che faccia il primo passo."},
      {type:'prose',text:"Il silenzio che seguì era diverso da quelli precedenti. Era un silenzio carico, come l'aria prima del temporale che Milo aveva imparato a riconoscere nell'infanzia, quando saliva sul tetto della bottega e guardava il cielo cambiare colore."},
      {type:'prose',text:"Quella notte, tornando a casa sotto le stelle fredde di novembre, Milo incontrò suo padre sveglio accanto al fuoco quasi spento. Corrado teneva in mano un piccolo oggetto di ferro, girandolo tra le dita: era un piccolo scudo, lavorato con cura, del tipo che si appendeva alle cinture come ornamento. Milo lo riconobbe: era il simbolo di Montagnana, che suo padre aveva forgiato anni prima per un armigero della città."},
      {type:'prose',text:"Lo aveva tenuto nascosto per tutto quel tempo."},
      {type:'dialogue',text:"— Padre — disse Milo sottovoce."},
      {type:'prose',text:"Corrado alzò gli occhi. Non disse niente. Tese semplicemente la mano e offrì al figlio il piccolo scudo di ferro."},
      {type:'prose',text:"Milo lo prese. Lo strinse nel pugno fino a sentire i bordi incidersi nel palmo."},
      {type:'prose',text:"Non aveva bisogno di parole. Alcune cose tra padre e figlio viaggiano senza il suono delle sillabe, lungo strade più antiche del linguaggio."},
      {type:'prose',text:"Il momento giusto non era ancora arrivato."},
      {type:'prose',text:"Ma Montagnana non aveva dimenticato chi era. E Milo, figlio del fabbro, portava adesso nel pugno chiuso il peso leggero di uno scudo di ferro e il peso infinitamente più grande di una città che aspettava."}
    ]
  },
  {
    id: 5, num: 'Capitolo V', title: 'Le Mura Rinascono',
    year: 'Montagnana, primavera 1244',
    audio: 'Le mura rinascono.mp3',
    paragraphs: [
      {type:'prose',text:"La notizia arrivò con un mercante di stoffe da Castelbaldo."},
      {type:'prose',text:"Era un uomo tarchiato, con la barba rossa e gli occhi furbi di chi ha imparato a sopravvivere ai mercati e alle guerre con la stessa disinvoltura. Si chiamava Renzo, e ufficialmente veniva a vendere tessuti alle mogli dei soldati del presidio. In realtà portava qualcosa di molto più prezioso nascosto nel doppio fondo del suo carro."},
      {type:'prose',text:"Milo lo incontrò nel retrobottega di Fante il calzolaio, come sempre, in una sera di maggio che profumava di terra smossa e di erba nuova."},
      {type:'dialogue',text:"— Da Castelbaldo mandano saluti — disse Renzo, posando sul tavolo un rotolo di pergamena consumata. — E mandano anche questo."},
      {type:'prose',text:"Bertone aprì il rotolo e lo lesse lentamente, muovendo le labbra. Poi alzò gli occhi con un'espressione che Milo non gli vedeva da molto tempo."},
      {type:'dialogue',text:"— Rinaldo da Castelbaldo ha posto alla piazzaforte quattrocento soldati — disse il vecchio, con la voce di chi stenta a credere alle proprie parole. — Ottanta a cavallo. Una guarnigione vera, non una pattuglia. Controllano la via dell'Adige e tengono a bada gli uomini di Ezzelino da est."},
      {type:'dialogue',text:"— Castelbaldo regge — disse Simone il mugnaio, con una soddisfazione contenuta ma visibile."},
      {type:'dialogue',text:"— Non solo regge — disse Renzo, appoggiandosi allo schienale della sedia con l'aria di chi ha tenuto il meglio per ultimo. — Gli armigeri di Castelbaldo hanno fatto sapere che sono pronti a muoversi. Aspettano solo il segnale. Se Montagnana si solleva, loro arrivano lungo il fiume."},
      {type:'prose',text:"Il silenzio che seguì era denso come miele."},
      {type:'prose',text:"Milo fissò la pergamena sul tavolo. Pensò al fiume Adige che scorreva a pochi giorni di marcia, alle barche dei commercianti che conosceva sin da bambino, alle rive dove aveva pescato con suo padre nelle estati lontane. Quel fiume che era sempre stato via di commercio e di vita poteva diventare via di liberazione."},
      {type:'dialogue',text:"— Quanto tempo ci vuole? — chiese."},
      {type:'dialogue',text:"— Due giorni di marcia per la fanteria — disse Renzo. — Meno per la cavalleria, se il tempo regge e i guadi sono praticabili."},
      {type:'dialogue',text:"— Allora dobbiamo essere pronti — disse Milo. — Quando loro arrivano, noi dobbiamo già tenere qualcosa. Una porta, una torre, qualsiasi cosa che gli apra la strada."},
      {type:'prose',text:"Bertone lo guardò con quegli occhi vecchi e acuti che avevano visto troppe battaglie."},
      {type:'dialogue',text:"— Parli come un capitano — disse."},
      {type:'dialogue',text:"— Parlo come un ragazzo che non vuole sprecare l'unica occasione che abbiamo — rispose Milo semplicemente."},
      {type:'prose',text:"Nessuno rise. Nessuno obiettò."},
      {type:'prose',text:"Nelle settimane successive il gruppo lavorò con una precisione che Milo non sapeva di avere dentro di sé. Ogni mossa fu calcolata, ogni rischio pesato. Agnese la vedova continuò i suoi giri al presidio con il pane caldo, raccogliendo informazioni sui turni di guardia. Don Ilario usò la rete dei confessionali per stabilire contatti con altri gruppi di resistenza che si erano formati in modo spontaneo nei mesi precedenti, piccoli nuclei di uomini silenziosi sparsi nei vicoli della città come braci sotto la cenere."},
      {type:'prose',text:"Simone il mugnaio disegnò su pergamena una mappa dettagliata delle mura, segnando i punti più deboli, i varchi sorvegliati e quelli abbandonati, le torri presidiate e quelle vuote nelle ore notturne."},
      {type:'prose',text:"E Milo imparò a tenere tutto insieme, a essere il centro di una ruota i cui raggi correvano in direzioni diverse ma convergevano tutti verso lo stesso punto."},
      {type:'prose',text:"Fu in quei giorni che conobbe Giacomo."},
      {type:'prose',text:"Era un ragazzo di poco più di quindici anni, figlio di un contadino di Megliadino San Vitale, arrivato a Montagnana con una scusa di lavoro e in realtà portatore di messaggi dal mondo rurale che circondava la città. Aveva i capelli rossi come il grano maturo e una risata facile che sembrava fuori posto in quel tempo di guerra, ma che si rivelò essere una delle armi più efficaci del gruppo: nessuno sospetta di chi ride. Suo padre, che portava lo stesso nome, era stato tra i primi a organizzare la rete di informatori nei villaggi, ma un'infermità alle gambe lo tratteneva ormai lontano dai lunghi tragitti. Era dunque toccato al figlio raccogliere il suo testimone."},
      {type:'dialogue',text:"— I villaggi aspettano — disse Giacomo la prima volta che si incontrarono, con quella sua aria di chi racconta una cosa ovvia. — I contadini di San Vitale, di San Fidenzio, di Merlara. Hanno forche e falci, non spade. Ma sono tanti e conoscono la terra meglio di qualsiasi soldato."},
      {type:'dialogue',text:"— Non voglio contadini con le forche — disse Milo. — Voglio occhi. Voglio sapere quando si muovono le truppe di Ezzelino, da dove vengono e dove vanno."},
      {type:'prose',text:"Giacomo annuì con quella sua aria perennemente allegra."},
      {type:'dialogue',text:"— Questo possiamo farlo. I nostri occhi sono dappertutto. Nei campi, lungo i fossi, sulle rive dell'Adige. Se un topo si muove nella pianura, lo sappiamo."},
      {type:'prose',text:"E così fu. La rete si allargò oltre le mura, lungo le strade di terra battuta e i sentieri tra i campi, fino alle rive del fiume dove le barche dei commercianti si fermavano a caricare e scaricare merci e, senza saperlo, portavano anche notizie."},
      {type:'prose',text:"Nel frattempo, i lavori sulle nuove mura di pietra procedevano. Ezzelino aveva ordinato la costruzione di difese permanenti dopo l'incendio, e Montagnana si stava lentamente dotando di mura in muratura che avrebbero resistito al fuoco. Era un paradosso che non sfuggì a Milo: il tiranno stava costruendo le difese che un giorno avrebbero protetto la città libera."},
      {type:'prose',text:"Suo padre Corrado lavorava ogni giorno ai ferri necessari per la costruzione. Cardini enormi, chiodi, rinforzi metallici per i portoni. Una sera, tornando a casa, posò sul tavolo uno strano oggetto: era un cardine lavorato in modo sottilmente imperfetto, con una piccola leva nascosta nella cerniera che, se azionata nel modo giusto, avrebbe permesso di smontare il portone dall'interno in pochi secondi."},
      {type:'dialogue',text:"— Ho installato il primo su un portone secondario delle mura nuove — disse Corrado, con la voce piatta di chi riferisce un fatto tecnico. — Nessuno se ne è accorto. Sembra un lavoro perfettamente normale."},
      {type:'prose',text:"Milo guardò il padre per un lungo momento. L'uomo che aveva lavorato in silenzio per il nemico per due anni, che aveva battuto il ferro senza parlare, che aveva tenuto nascosto lo scudo di Montagnana nella bottega — aveva aspettato il momento giusto a modo suo. Aveva lavorato dall'interno, con gli strumenti che conosceva, nel solo modo che poteva."},
      {type:'dialogue',text:"— Quanti portoni? — chiese Milo sottovoce."},
      {type:'dialogue',text:"— Per ora uno. Ma ho tempo."},
      {type:'prose',text:"Milo pensò agli armigeri di Castelbaldo pronti a muoversi lungo il fiume. Pensò agli occhi di Giacomo nei campi di Megliadino. Pensò alle braci nascoste sotto la cenere di Montagnana. Pensò al portone che si poteva aprire dall'interno in pochi secondi."},
      {type:'prose',text:"I pezzi cominciavano ad andare al loro posto."},
      {type:'prose',text:"Quella notte scrisse un messaggio breve e lo affidò a Renzo il mercante di stoffe, che ripartiva all'alba verso Castelbaldo con il suo carro pesante di tessuti e di segreti."},
      {type:'prose',text:"Il messaggio diceva solo: Siamo pronti. Aspettiamo la primavera."},
      {type:'prose',text:"Non era ancora la primavera giusta. Ma si avvicinava."},
      {type:'prose',text:"E le mura nuove di Montagnana salivano verso il cielo, pietra su pietra, costruite dalle mani del nemico e già pronte, in qualche angolo nascosto che solo un fabbro sapeva trovare, ad aprirsi per chi avesse la chiave giusta."}
    ]
