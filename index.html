  {
    id: 6, num: 'Capitolo VI', title: 'La Liberazione',
    year: 'Montagnana, estate 1245',
    audio: 'La liberazione.mp3',
    paragraphs: [
      {type:'prose',text:"Il segnale arrivò all'alba di una mattina di luglio, quando la nebbia dell'Adige strisciava ancora bassa sui campi e i soldati del presidio erano mezzo addormentati nei loro turni di guardia."},
      {type:'prose',text:"Era Giacomo a portarlo, trafelato, con i capelli rossi incollati di sudore sulla fronte e gli occhi accesi di quella luce che Milo aveva imparato a riconoscere come la luce delle buone notizie."},
      {type:'dialogue',text:"— Si muovono — disse il ragazzo, senza nemmeno chiudere la porta del retrobottega di Fante. — Gli armigeri di Castelbaldo si muovono. Rinaldo ha dato il via. Ottanta cavalieri sull'Adige, la fanteria segue a meno di un giorno."},
      {type:'prose',text:"Nel retrobottega calò un silenzio assoluto. Poi Bertone si alzò, lentamente, con quello scricchiolio delle ginocchia che era diventato il suono del coraggio per Milo. Il vecchio soldato non disse niente. Prese la sua spada dal chiodo al muro, la guardò un momento come se ringraziasse qualcuno, e la appese alla cintura."},
      {type:'dialogue',text:"— Allora è oggi — disse semplicemente."},
      {type:'prose',text:"Il piano era stato preparato da mesi, ripassato decine di volte nel buio di quel retrobottega finché ognuno sapeva cosa fare anche senza che nessuno glielo dicesse. Milo e Giacomo avrebbero aperto il portone secondario con la leva nascosta nel cardine di suo padre, mentre Simone il mugnaio e tre uomini fidati avrebbero neutralizzato la guardia alla torre orientale. Don Ilario avrebbe fatto suonare le campane nel momento giusto — non come allarme, ma come segnale ai cittadini di Montagnana che aspettavano da tre anni."},
      {type:'prose',text:"La cosa più difficile fu aspettare."},
      {type:'prose',text:"Milo trascorse le ore del mattino a muoversi nella città con calma studiata, portando messaggi, affilando lame, sorridendo alle guardie come faceva ogni giorno. Giacomo si era posizionato sul camminamento ovest con una scusa di lavoro e guardava la pianura con quegli occhi che sapevano leggere la terra come un testo scritto."},
      {type:'dialogue',text:"— Quanto manca? — chiese Milo sottovoce passandogli accanto con un cestino di pane — apparentemente diretto al presidio."},
      {type:'dialogue',text:"— Tre ore. Forse meno. — Giacomo non alzò gli occhi dalla pianura. — Il polverone è già visibile dai campi di Megliadino. I nostri uomini là fuori sanno già."},
      {type:'dialogue',text:"— Bene. — Milo riprese a camminare. — Non ridere."},
      {type:'dialogue',text:"— Non rido mai — disse Giacomo. E rise."},
      {type:'prose',text:"Erano le seconde ore del pomeriggio quando la sentinella sulla torre nord diede l'allarme. Ma era già tardi."},
      {type:'prose',text:"Mentre le trombe del presidio cominciavano a suonare e i soldati di Ezzelino correvano verso le armi, Milo era già al portone secondario. Aveva le mani che tremavano — le stesse mani che aveva imparato a far smettere di tremare — ma il cardine cedette esattamente come suo padre aveva promesso, con uno scatto preciso e silenzioso. Il portone si aprì verso l'interno."},
      {type:'prose',text:"Fuori c'era la pianura, e nella pianura c'era la cavalleria di Castelbaldo."},
      {type:'prose',text:"Rinaldo da Castelbaldo era un uomo sulla cinquantina, con la barba bianca e la corazza ammaccata di chi non ha mai combattuto per apparire. Quando il suo cavallo varcò il portone aperto, guardò Milo con quegli occhi diritti dei soldati che non perdono tempo."},
      {type:'dialogue',text:"— Figlio del fabbro? — chiese."},
      {type:'dialogue',text:"— Sì, messere."},
      {type:'dialogue',text:"— Ottimo lavoro — disse Rinaldo, e passò oltre al galoppo."},
      {type:'prose',text:"Quello che seguì non fu la battaglia ordinata che Milo aveva immaginato nelle notti di preparazione. Fu caos, rumore, polvere e ferro. La cavalleria di Castelbaldo si riversò nei vicoli come un fiume in piena, travolgendo le prime linee del presidio prima che potessero organizzare una difesa. Le campane di don Ilario cominciarono a suonare — il segnale — e dai vicoli, dalle botteghe, dai cortili cominciarono ad uscire gli uomini di Montagnana, armati di quello che avevano: spade nascoste, asce da lavoro, bastoni, qualcuno perfino con i forconi che Milo aveva respinto mesi prima come inutili."},
      {type:'prose',text:"Non erano inutili. Erano abbastanza."},
      {type:'prose',text:"Milo combatté per la prima volta senza un capitano alle spalle che lo proteggesse. Combatté nel vicolo vicino alla bottega di suo padre, dove conosceva ogni pietra e ogni angolo, dove sapeva dove mettere i piedi senza guardare. Un soldato tedesco lo affrontò con una lancia lunga in uno spazio troppo stretto per usarla bene, e Milo sfruttò quello spazio come avrebbe sfruttato il vantaggio di un buon ferro ben temperato."},
      {type:'prose',text:"Fu Giacomo a salvargli la vita, quella mattina."},
      {type:'prose',text:"Milo non lo vide arrivare. Stava respingendo il tedesco verso il muro quando un secondo soldato, più furbo del primo, si avvicinò dal lato cieco. Sentì un urlo — quella risata di Giacomo trasformata in grido di battaglia — e il secondo soldato cadde di lato colpito da qualcosa che Milo non capì subito: un sacco di farina lanciato con precisione impressionante dall'alto di un balcone."},
      {type:'dialogue',text:"— Simone! — gridò Giacomo dall'alto, apparendo sul balcone con la faccia bianca di farina e un sorriso enorme. — Funziona!"},
      {type:'dialogue',text:"— Non avevamo concordato i sacchi di farina nel piano! — urlò Milo, disarmando il tedesco con un colpo secco all'avambraccio."},
      {type:'dialogue',text:"— I piani si migliorano — disse Giacomo, già sparito per le scale."},
      {type:'prose',text:"Nel tardo pomeriggio, quando le ombre dei campanili si allungavano sui vicoli e il fumo degli scontri cominciava a dissiparsi, era chiaro che la battaglia era vinta. Le truppe di Ezzelino nel presidio, prese tra la cavalleria di Castelbaldo che spingeva dall'esterno e i cittadini di Montagnana che insorgevano dall'interno, si erano disggregate. Alcuni avevano combattuto fino all'ultimo. Altri si erano arresi. Pochi erano fuggiti verso nord."},
      {type:'prose',text:"Il podestà Aldrovando era già stato fatto prigioniero e il gonfalone del Romano era stato strappato dalla torre più alta e sostituito con quello di Montagnana."},
      {type:'prose',text:"Ezzelino, che nella fuga si era astutamente infiltrato tra le fila di un drappello di cavalleria tedesca al suo comando, fu disarcionato ma, non riconosciuto, ebbe l'opportunità di rimontare a cavallo e porsi in salvo."},
      {type:'prose',text:"Montagnana rimase contesa per anni, ma il controllo diretto del Romano sulla città era finito. E nei decenni successivi, quando Ezzelino cadde nel 1259 come un grande albero marcio che crolla all'improvviso, fracassando tutto intorno nella caduta, Montagnana era già diversa da quella che aveva conquistato. Più dura. Più consapevole. Con dentro qualcosa che il fuoco non aveva bruciato e la conquista non era riuscita a spegnere."},
      {type:'prose',text:"Quella sera, Milo sedette sui gradini della bottega di suo padre. Corrado era accanto a lui, in silenzio come sempre, ma era un silenzio diverso. Era il silenzio di chi ha finito di aspettare."},
      {type:'prose',text:"Bertone arrivò poco dopo, con la spada ancora sporca e la coppa — la sua solita coppa — già in mano. Si sedette sull'altro lato di Milo senza dire niente."},
      {type:'prose',text:"La piazza si andava riempiendo di gente. Qualcuno piangeva. Qualcuno rideva. Qualcuno faceva entrambe le cose. Le torce venivano accese una a una lungo i camminamenti, non più sentinelle della conquista ma fuochi di una città che tornava a respirare."},
      {type:'dialogue',text:"— Bertone — disse Milo alla fine. — Il momento giusto è arrivato."},
      {type:'prose',text:"Il vecchio soldato guardò la piazza, guardò le torce, guardò il gonfalone di Montagnana che sventolava sulla torre più alta nella brezza della sera."},
      {type:'dialogue',text:"— Viene sempre — disse. — Per chi ha la pazienza di aspettarlo."},
      {type:'prose',text:"Giacomo arrivò di corsa da chissà dove, ancora tutto bianco di farina su un lato della faccia, e si sedette sull'ultimo gradino disponibile con quella sua aria di chi non capisce perché gli altri non sorrida continuamente."},
      {type:'dialogue',text:"— Ho fame — disse. — Qualcuno ha del pane?"},
      {type:'prose',text:"Corrado tirò fuori da sotto il mantello una pagnotta che sembrava aver portato lì apposta. La spezzò in quattro pezzi senza una parola. La distribuì in silenzio."},
      {type:'prose',text:"Mangiarono così, seduti sui gradini della bottega del fabbro, mentre Montagnana si ricordava ad alta voce di essere viva."}
    ]
  },
  {
    id: 7, num: 'Capitolo VII', title: 'I Carraresi',
    year: 'Montagnana e dintorni, estate 1318',
    audio: 'I Carraresi.mp3',
    paragraphs: [
      {type:'prose',text:"Pietro aveva i capelli grigi alle tempie."},
      {type:'prose',text:"Lo stesso grigio che suo padre Milo aveva avuto quando gli raccontava le storie sulle mura, in quelle notti lontane sotto le stelle. Il tempo aveva fatto il suo lavoro silenzioso, come sempre, senza chiedere permesso a nessuno. Pietro aveva sessant'anni e portava i segni di una vita trascorsa tra le mura di una città che aveva imparato a essere libera con la stessa fatica con cui si impara qualsiasi cosa che vale davvero."},
      {type:'prose',text:"Milo se ne era andato vent'anni prima, in una mattina d'inverno del 1298, seduto accanto al fuoco con lo sguardo rivolto verso la finestra da cui si vedeva un angolo di mura. Se ne era andato tenendo in mano il piccolo scudo di ferro, con la pace di chi ha fatto quello che doveva fare. Pietro aveva pianto una sola notte. Poi si era alzato, aveva preso il piccolo scudo dalla mano di suo padre, e aveva continuato. Era quello che si faceva a Montagnana. Si continuava."},
      {type:'prose',text:"Il vecchio Bertone era morto molto prima, nella sua casa vicino alle mura, nel sonno, come aveva sempre detto di voler morire. Fante il calzolaio aveva ceduto la bottega al figlio. Agnese la vedova era diventata nonna tre volte prima di spegnersi serenamente. Don Ilario, diventato arciprete, aveva smesso di usare il confessionale per raccogliere notizie di guerra — o almeno così diceva."},
      {type:'prose',text:"Accanto a Pietro, quella mattina di luglio, sedeva Giacomo di Megliadino. Non il Giacomo che Milo aveva conosciuto nel 1244 — quel ragazzo dai capelli rossi era morto da molti anni, le gambe mai guarite del tutto da una caduta sui sentieri dell'Adige. Ma suo figlio, che portava lo stesso nome per volontà del padre e la stessa risata facile per dono della natura."},
      {type:'dialogue',text:"— I Carraresi si muovono — disse Giacomo, sedendosi accanto a Pietro sulla panca davanti alla bottega. — Iacopo da Carrara ha sconfitto gli Scaligeri. Il quindici di questo mese lo hanno nominato Capitano del Popolo a Padova."},
      {type:'prose',text:"Pietro annuì lentamente. Conosceva i Carraresi come si conoscono i vicini con cui si è condivisa una parete sottile per molti anni: abbastanza da sapere che non erano né santi né demoni, ma uomini di potere con le ambizioni e le debolezze che quel ruolo portava con sé."},
      {type:'dialogue',text:"— Cosa vogliono da Montagnana?"},
      {type:'dialogue',text:"— Quello che vogliono tutti — disse Giacomo, con quella sua semplicità disarmante. — La città, le mura, la posizione. La chiave tra Verona e Padova non cambia valore con i secoli."},
      {type:'dialogue',text:"— E Cangrande della Scala?"},
      {type:'prose',text:"Giacomo aprì le mani in un gesto eloquente."},
      {type:'dialogue',text:"— Cangrande è il vicario imperiale. Ha i denti lunghi e le braccia più lunghe ancora. Prima o poi Iacopo dovrà fare i conti con lui."},
      {type:'prose',text:"Come sempre, Giacomo aveva ragione. L'anno seguente Iacopo da Carrara dovette cedere le fortezze padovane a Cangrande, Montagnana compresa. La città cambiò ancora padrone con quella consuetudine ormai antica che aveva insegnato ai Montagnanesi a guardare ogni nuova signoria con occhi aperti e cuore cauto."},
      {type:'prose',text:"Ma fu con i Carraresi successivi che qualcosa cominciò a cambiare davvero."},
      {type:'prose',text:"Ubertino da Carrara arrivò a Montagnana in una mattina d'autunno del 1340 con un piccolo seguito di consiglieri e architetti. Non con un esercito. Si fermò a lungo davanti alle mura, camminando lungo il perimetro con uno dei suoi architetti, indicando punti, chiedendo misure, ascoltando risposte con quella particolare attenzione di chi prende le decisioni dopo aver capito davvero."},
      {type:'dialogue',text:"— Le mura occidentali sono le più esposte — disse Luca, indicando il tratto che guardava verso la pianura aperta. — Se un esercito arriva da ovest con macchine d'assedio, quella è la debolezza. Mio nonno Milo lo disse al suo tempo. Nessuno lo ascoltò abbastanza in fretta."},
      {type:'dialogue',text:"— E cosa proporresti?"},
      {type:'dialogue',text:"— Un bastione più avanzato — disse Luca, dopo un momento. — Una rocca che controlli l'accesso occidentale. Abbastanza forte da resistere anche se le mura cedessero."},
      {type:'prose',text:"Ubertino annuì lentamente, come se quella risposta confermasse qualcosa che aveva già deciso."},
      {type:'dialogue',text:"— Ci pensiamo — disse semplicemente."},
      {type:'prose',text:"Nel frattempo, lungo le strade del Montagnanese, la vita riprendeva i suoi ritmi antichi con la tenacia delle cose che non vogliono morire. Da Casale di Scodosia arrivavano i contadini con i prodotti dei campi bonificati. I pescatori di Santa Margherita d'Adige risalivano il fiume con le barche cariche. A Merlara i mercanti levavano i loro banchi sotto gli stemmi con i due merli. A Urbana i monaci del convento insegnavano ai giovani a leggere e scrivere. E lungo l'Adige, da Castelbaldo a Masi, le barche continuavano il loro antico commercio tra Verona e il mare."},
      {type:'prose',text:"Fu il figlio di Giacomo — giovane Matteo, dai capelli ancora più rossi del padre — a portare a Luca la notizia più importante di quell'autunno."},
      {type:'dialogue',text:"— Gli armigeri di Castelbaldo — disse, senza nemmeno sedersi. — Francesco da Carrara li ha confermati. Quattrocento soldati, ottanta a cavallo. Ha fatto sapere che Castelbaldo resta piazzaforte contro gli Scaligeri. Le truppe rimangono."},
      {type:'dialogue',text:"— Castelbaldo ha tenuto — disse Luca sottovoce."},
      {type:'dialogue',text:"— Castelbaldo tiene sempre — disse Matteo. — È quello che fanno, sulle rive del fiume. Tengono."},
      {type:'prose',text:"Quella sera, Luca salì sulla torre che aveva conosciuto da bambino. Le mura di pietra si stendevano intorno alla città come un abbraccio solido e eterno, così diverse dalle mura di legno dell'infanzia di Milo, quelle che erano bruciate in una notte sola."},
      {type:'dialogue',text:"— Padre? — Andrea era salito silenzioso alle sue spalle. — Cosa guardi?"},
      {type:'dialogue',text:"— Il Montagnanese — disse Luca. — Guardalo bene. Ogni borgo, ogni torre, ogni campanile. Ogni pezzo di questa terra ha una storia che vale la pena di conoscere."},
      {type:'dialogue',text:"— Me la racconti?"},
      {type:'dialogue',text:"— Ci vorrebbe tutta la notte — disse Luca."},
      {type:'dialogue',text:"— Ho tutta la notte — rispose Andrea semplicemente."},
      {type:'prose',text:"E così, sulle mura di Montagnana, mentre la luna saliva sulla Sculdascia e le stelle si accendevano una a una sopra i dieci comuni, Luca cominciò a raccontare. Dall'inizio, dalla bottega di Corrado, dalla notte di fuoco, dagli occhi indifferenti di Ezzelino, dal piccolo scudo di ferro che portava ancora appeso alla cintura come un talismano."},
      {type:'prose',text:"Raccontò di Bertone e di Fante e di Agnese. Degli armigeri di Castelbaldo che avevano aspettato il segnale sulle rive dell'Adige. Di Giacomo e della sua risata impossibile in tempo di guerra. Del sacco di farina. Delle mura che erano cresciute dalla cenere più forti di prima."},
      {type:'prose',text:"Raccontò tutto, mentre la notte scendeva sulla pianura e i dieci comuni dormivano nella loro antica pace faticosa. E Andrea ascoltò ogni parola, come si ascoltano le cose che devono essere ricordate."}
    ]
  },
  {
    id: 8, num: 'Capitolo VIII', title: 'La Rocca degli Alberi',
    year: 'Montagnana, 1360–1405',
    audio: 'La rocca degli alberi.mp3',
    paragraphs: [
      {type:'prose',text:"Andrea era invecchiato adesso."},
      {type:'prose',text:"Come suo padre Luca prima di lui, quando gli raccontava le storie sulle mura, quella notte lontana sotto le stelle. Il tempo aveva fatto il suo lavoro silenzioso, come sempre, senza chiedere permesso a nessuno."},
      {type:'prose',text:"Luca non c'era più. Se n'era andato in una mattina di primavera del 1348, quando la peste nera aveva attraversato il Montagnanese come una falce invisibile, mietendo senza distinzione tra poveri e ricchi, tra soldati e contadini, tra chi aveva combattuto per la libertà e chi aveva semplicemente vissuto. Se n'era andato tenendo in mano il piccolo scudo di ferro che era appartenuto a Milo e a Pietro prima di lui, con gli occhi rivolti verso la finestra da cui si vedeva un angolo di mura."},
      {type:'prose',text:"Andrea aveva pianto una sola notte. Poi si era alzato, aveva preso il piccolo scudo dalla mano di suo padre, e aveva continuato. Era quello che si faceva a Montagnana. Si continuava."},
      {type:'prose',text:"Adesso era lui l'anziano che i giovani guardavano cercando risposte, lui il depositario della memoria, lui che conosceva ogni pietra delle mura e ogni storia di ogni torre. E adesso, nell'anno del Signore 1360, stava guardando qualcosa che nessuno della sua famiglia aveva ancora visto: la nascita di una rocca nuova."},
      {type:'prose',text:"Francesco il Vecchio da Carrara aveva mandato a Montagnana il suo architetto migliore, Franceschino de' Schici, con ordini precisi e risorse adeguate. La rocca doveva sorgere a occidente, esattamente dove Milo aveva detto tanti anni prima indicando la debolezza delle mura, quel tratto esposto alla pianura aperta che un esercito con macchine d'assedio avrebbe potuto sfruttare."},
      {type:'prose',text:"Andrea aveva sorriso quando aveva saputo. Il bisnonno aveva visto giusto. Come sempre."},
      {type:'prose',text:"I lavori cominciarono nella primavera del 1360 con una frenesia organizzata che Andrea non aveva mai visto. Franceschino de' Schici era un uomo piccolo e nervoso, sempre in movimento, con gli occhi che correvano veloci sui disegni e sulle pietre con la stessa intensità. Parlava poco e costruiva molto, e quello che costruiva era di una precisione che faceva quasi paura."},
      {type:'dialogue',text:"— Qui — disse Franceschino un mattino, piantando un piolo nel terreno vicino alle mura. — La rocca sorge qui, tra questi due tratti. Un androne di passaggio, un torrione orientale, e il mastio. Otto piani il mastio, con garitta in cima."},
      {type:'dialogue',text:"— Otto piani — ripeté Andrea."},
      {type:'dialogue',text:"— Chi controlla l'ottavo piano di quella torre — disse Franceschino, senza alzare gli occhi dal disegno — vede fino all'Adige in una direzione e fino alle colline Euganee nell'altra. Nessun esercito può avvicinarsi senza essere visto con largo anticipo."},
      {type:'dialogue',text:"— Quante chiusure? — chiese Andrea."},
      {type:'dialogue',text:"— Dieci chiusure mobili. Quattro ponti levatoi, quattro portoni, due saracinesche. Ogni sezione della rocca può essere isolata dalle altre. Si può perdere l'androne e tenere il torrione. Si può perdere il torrione e tenere il mastio. Si può perdere tutto il resto e resistere ancora nel mastio per settimane, con i pozzi d'acqua, i magazzini di viveri, le stalle, i camini."},
      {type:'dialogue',text:"— Una rocca dentro la rocca — disse Andrea sottovoce."},
      {type:'dialogue',text:"— Esattamente — disse Franceschino, con qualcosa che assomigliava a un sorriso. — Una rocca che non si arrende mai del tutto. Sempre c'è un ultimo baluardo. Sempre c'è qualcosa che tiene."},
      {type:'prose',text:"I lavori durarono due anni. Andrea li seguì ogni giorno, diventando una presenza fissa tra gli operai e i capomastri, riconoscibile per il suo mantello scuro e il piccolo scudo di ferro appeso alla cintura. Gli operai lo chiamavano rispettosamente il vecchio delle mura, e lui accettava il titolo senza protestare perché era semplicemente la verità."},
      {type:'prose',text:"Vide crescere il mastio piano dopo piano, le mura spesse e solide che salivano verso il cielo con una lentezza ostinata. Vide installare i meccanismi dei ponti levatoi, i verricelli, le saracinesche. Vide scolpire sulle porte le lapidi araldiche: a sinistra il carro dei Carraresi, al centro l'elmo e lo scudo di Francesco il Vecchio, a destra la croce del Comune di Padova."},
      {type:'prose',text:"E quando nel 1362 la Rocca degli Alberi fu completata e si stagliò per la prima volta contro il cielo occidentale di Montagnana con i suoi merli e le sue feritoie, Andrea salì fino all'ottavo piano del mastio e guardò il Montagnanese dall'alto come non aveva mai guardato prima."},
      {type:'prose',text:"A sud, i campi di Casale di Scodosia si stendevano ordinati fino all'orizzonte. A ovest, Urbana e poi Merlara con i suoi due merli sullo stemma. A est, tra il verde scuro dei boschi, si intuivano i campanili di Saletto, Megliadino San Vitale e San Fidenzio. Verso il fiume, lungo il nastro lucente dell'Adige, le torri di Castelbaldo e Masi sorvegliavano la via del fiume come avevano sempre fatto."},
      {type:'prose',text:"E intorno, le mura di Montagnana, le stesse che il bisnonno Milo aveva visto bruciare e rinascere, correvano complete e solide lungo tutto il perimetro, la città stretta nel loro abbraccio di pietra come un bambino nel mantello della madre."},
      {type:'prose',text:"Andrea rimase lassù a lungo, finché il sole non cominciò a scendere verso i colli lontani. Poi scese e tornò a casa."},
      {type:'prose',text:"Gli anni che seguirono dimostrarono che Franceschino de' Schici sapeva costruire. Nel 1405, quando le truppe veneziane si mossero verso Montagnana con la determinazione di chi sa di essere più forte e aspetta solo il momento di dimostrarlo, la Rocca degli Alberi era ancora lì, solida e fredda, con i suoi ponti levatoi alzati e le sue feritoie presidiate."},
      {type:'prose',text:"A difenderla c'era Tommaso da Mantova, podestà della città. Tommaso sapeva che Venezia avrebbe vinto. Lo sapeva come si sa che il fiume scorre verso il mare. Ma Tommaso da Mantova tenne la rocca fino all'ultimo assalto. Non per inutile orgoglio. Non per la gloria personale. Tenne perché era quello il suo compito, perché le mura che difendeva erano state costruite con il sudore e il sangue di generazioni, perché ogni ora di resistenza era un atto di rispetto verso chi aveva costruito quelle pietre e verso chi sarebbe venuto dopo."},
      {type:'prose',text:"Quando alla fine cedette, lo fece con la testa alta e le condizioni di chi ha combattuto fino in fondo."},
      {type:'prose',text:"Marco, figlio di Andrea, discendente di Milo figlio del fabbro, era tra la gente che guardava entrare i soldati veneziani dalla porta occidentale, sotto il leone di San Marco che sostituiva i simboli dei Carraresi sulle lapidi araldiche. Era un ragazzo di trent'anni con i capelli scuri e gli occhi chiari, gli stessi occhi che si tramandavano in quella famiglia come un segno di riconoscimento tra le generazioni."},
      {type:'prose',text:"Aveva in mano il piccolo scudo di ferro che era stato di Milo, poi di Pietro, poi di Luca, poi di Andrea, poi suo. Lo stringeva nel pugno come aveva sentito raccontare che faceva il trisavolo nei momenti difficili."},
      {type:'dialogue',text:"— Terremo la testa alta? — chiese sottovoce la voce di sua cugina Elena accanto a lui."},
      {type:'dialogue',text:"— La terremo alta — disse Marco. — È quello che si fa qui. È quello che abbiamo sempre fatto."},
      {type:'prose',text:"Il leone di San Marco sventolava adesso sulla torre più alta. Ma le pietre erano le stesse. Le mura erano le stesse. E sotto il leone, incise nella pietra, le lapidi araldiche dei Carraresi resistevano come resistono tutte le memorie vere: silenziose, testarde, impossibili da cancellare del tutto."},
      {type:'prose',text:"Montagnana aveva cambiato padrone ancora una volta. Ma Montagnana era ancora Montagnana."}
    ]
  },
  {
    id: 9, num: 'Capitolo IX', title: 'Il Palio',
    year: 'Montagnana, estate 1420',
    audio: 'Il Palio.mp3',
    paragraphs: [
      {type:'prose',text:"Il tamburo cominciò a battere prima dell'alba."},
      {type:'prose',text:"Marco lo sentì nel sonno, quel ritmo lento e profondo che saliva dal vallo come il battito di un cuore antico, e si svegliò di scatto con il cuore che già correva. Rimase un momento immobile nel buio della stanza, ascoltando. Poi sorrise, perché quel suono significava una cosa sola."},
      {type:'prose',text:"Era il giorno del Palio."},
      {type:'prose',text:"Si alzò in fretta, si vestì nel buio con le mani abituate, e prese dal ripiano accanto al letto il piccolo scudo di ferro. Lo tenne un momento nel palmo aperto, sentendo il peso familiare, i bordi consumati dal tempo e da troppe mani che lo avevano stretto. Pensò a Milo che lo aveva ricevuto dal padre Corrado in una notte silenziosa davanti al fuoco quasi spento. Pensò a Pietro che lo aveva portato sulle mura nelle notti di guardia. Pensò a Luca che lo aveva stretto guardando le truppe straniere passare. Pensò ad Andrea che lo aveva tenuto mentre la Rocca degli Alberi cresceva pietra su pietra. Pensò a suo padre che glielo aveva messo in mano morendo con quella stessa semplicità silenziosa che sembrava essere il marchio di famiglia."},
      {type:'prose',text:"Lo appese alla cintura e scese in strada."},
      {type:'prose',text:"Montagnana era già sveglia."},
      {type:'prose',text:"Le torce ardevano lungo i camminamenti delle mura, proiettando ombre lunghe sui vicoli di pietra. La gente usciva dalle case in abiti dai colori vivaci, chi con il gonfalone del proprio comune, chi con la fascia colorata al braccio che indicava la contrada di appartenenza. I bambini correvano tra le gambe degli adulti con quella libertà caotica che ha l'alba delle feste, e le voci si mescolavano nell'aria fresca della mattina come i fili di una tela ancora da tessere."},
      {type:'dialogue',text:"— Marco! — Elena stava arrivando dalla direzione della porta orientale, il mantello rosso dei Montagnanesi sulle spalle."},
      {type:'dialogue',text:"— Sei già qui — disse lei, avvicinandosi. — Non hai dormito neanche tu?"},
      {type:'dialogue',text:"— Ho dormito abbastanza."},
      {type:'dialogue',text:"— Bugiardo. — Si mise accanto a lui e guardò il vallo nella luce crescente dell'alba. — Sai chi corre per Castelbaldo quest'anno?"},
      {type:'dialogue',text:"— Giovanni il rosso — disse Marco. — È bravo. Conosco il suo cavallo, un grigio veloce come il vento sull'Adige."},
      {type:'dialogue',text:"— E per Merlara?"},
      {type:'dialogue',text:"— Hanno scelto un ragazzo nuovo. Non lo conosco."},
      {type:'dialogue',text:"— Il trisavolo Milo ha mai visto il Palio? — chiese Elena sottovoce."},
      {type:'prose',text:"Marco ci pensò. Milo era morto nel 1298, quando il Palio era ancora un'idea, nata dalla necessità di tenere viva la memoria di ciò che era accaduto, di trasformare il dolore della conquista e il coraggio della resistenza in qualcosa che potesse essere celebrato invece che solo pianto."},
      {type:'dialogue',text:"— Non so se lo ha visto — disse Marco. — Ma so che lo avrebbe capito. Meglio di chiunque altro."},
      {type:'prose',text:"Nelle ore che seguirono, Montagnana si trasformò. Arrivarono i rappresentanti di tutti e dieci i comuni, ciascuno con i propri colori e i propri simboli. Da Casale di Scodosia vennero i contadini con le vesti color rosso e verde. Da Castelbaldo arrivò una delegazione imponente, con gli armigeri in tenuta da parata che marciavano compatti con quel passo solido e cadenzato dei soldati abituati a difendere una posizione. Erano gli eredi di quei quattrocento uomini che Rinaldo da Castelbaldo aveva guidato in soccorso di Montagnana, e lo sapevano, e lo portavano nella schiena dritta e nella testa alta."},
      {type:'prose',text:"Da Masi arrivarono i barcaioli con le giacche color acqua. Da Megliadino San Vitale e San Fidenzio vennero insieme, come sempre avevano fatto. Da Merlara arrivò il vecchio sindaco con i due merli sullo stemma. Da Saletto vennero i mercanti con i tessuti colorati. Da Santa Margherita d'Adige arrivarono le donne con i fiori dell'Adige nei capelli. Da Urbana infine i monaci del convento con le loro vesti scure e i loro rotoli di pergamena sotto il braccio."},
      {type:'prose',text:"Dieci comuni. Dieci storie. Un'unica piazza."},
      {type:'prose',text:"Marco li guardò arrivare uno a uno con qualcosa nel petto che non aveva un nome preciso ma che assomigliava alla gratitudine."},
      {type:'prose',text:"I dieci fantini erano già in sella, ciascuno con i colori del proprio comune, i cavalli irrequieti che battevano gli zoccoli sul terreno e scuotevano la testa come se sentissero nell'aria qualcosa di diverso dal solito. Marco riconobbe il fantino di Montagnana, un giovane di nome Alessio con le spalle larghe e le mani ferme, che teneva il cavallo con la calma sicura di chi sa aspettare il momento giusto."},
      {type:'prose',text:"Pensò che il trisavolo Milo avrebbe riconosciuto quella qualità. Era la stessa che aveva imparato nelle notti di guardia, la stessa che Bertone gli aveva insegnato senza saperlo, la stessa che si tramandava in quella terra come si tramandano i mestieri e le storie."},
      {type:'prose',text:"La campana della torre suonò tre volte. Il silenzio cadde sulla folla con la rapidità delle cose attese. Poi la campana suonò ancora, un colpo solo, secco e definitivo."},
      {type:'prose',text:"I cavalli scattarono."},
      {type:'prose',text:"Fu un momento di pura bellezza caotica, dieci animali e dieci uomini che diventavano una cosa sola con la terra sotto gli zoccoli e il vento contro le facce. La folla esplose in un boato che rimbalzò tra le mura antiche come aveva rimbalzato il fragore delle battaglie di un tempo, ma diverso, pieno di vita invece che di morte."},
      {type:'prose',text:"Marco gridò anche lui, senza accorgersene, con la voce che si perdeva nel coro di centinaia di altre voci. Vide il fantino di Castelbaldo prendere la testa dopo la prima curva, il grigio veloce di Giovanni il rosso che allungava il passo con quella fluidità degli animali nati per correre. Vide il fantino di Montagnana recuperare terreno lungo il rettilineo delle mura occidentali, affiancando il grigio e poi superandolo di mezza lunghezza."},
      {type:'prose',text:"Il fantino di Montagnana tagliò il traguardo per primo."},
      {type:'prose',text:"Il boato fu tale che i piccioni sulle torri si alzarono in volo tutti insieme, una nuvola grigia che salì verso il cielo azzurro dell'estate come un'offerta silenziosa."},
      {type:'prose',text:"Marco aveva le lacrime agli occhi e non se ne vergognava. Quando il drappo rosso fu consegnato al fantino vincitore e Alessio lo alzò sopra la testa con entrambe le mani, Marco strinse nel pugno il piccolo scudo di ferro."},
      {type:'prose',text:"Lo stringeva come lo aveva stretto Milo quella notte davanti al fuoco quasi spento. Come lo aveva stretto Pietro sulle mura nelle notti di guardia. Come lo aveva stretto Luca guardando le truppe straniere passare. Come lo aveva stretto Andrea mentre la Rocca degli Alberi cresceva. Come lo aveva stretto suo padre guardando entrare i soldati veneziani."},
      {type:'prose',text:"Ma adesso il gesto non era difesa. Non era attesa. Non era resistenza silenziosa nell'ombra. Era qualcosa di diverso e di più grande. Era memoria."},
      {type:'dialogue',text:"— Milo — disse sottovoce, in mezzo alla folla festante, in mezzo ai colori e ai tamburi e alle voci dei dieci comuni che celebravano insieme la loro antica unità. — Hai visto?"},
      {type:'prose',text:"Il vento salì dalle mura e gli scompigliò i capelli, tiepido e leggero, odorando di primavera e di erba nuova e di quella cosa indefinibile che è l'odore della terra che si ricorda di essere viva."},
      {type:'prose',text:"Marco la prese come risposta."},
      {type:'prose',text:"Più tardi, quando la festa era nel pieno e le torce si accendevano una a una lungo i camminamenti mentre il sole scendeva verso i colli lontani, Marco salì sulla torre più alta della Rocca degli Alberi. Guardò il Montagnanese nella luce dorata della sera, i dieci comuni sparsi nella pianura come gemme incastonate in una corona di acque e campi."},
      {type:'prose',text:"Tirò fuori da sotto il mantello un foglio di pergamena e uno stilo. Aveva imparato a scrivere dai monaci di Urbana, come aveva imparato suo padre e come aveva imparato suo nonno. La scrittura era il modo in cui la memoria sopravviveva ai corpi che la portavano."},
      {type:'prose',text:"Cominciò a scrivere lentamente, con quella cura che si mette nelle cose destinate a durare."},
      {type:'prose',text:"In quest'anno del Signore 1420, io Marco, figlio di Andrea, nipote di Luca, pronipote di Pietro, discendente di Milo figlio del fabbro Corrado, scrivo ciò che so affinché chi verrà dopo possa sapere da dove viene."},

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const audio = document.getElementById('audio-el');
let curChapter = 0;
let isPlaying = false;
let audioAvailable = {}; // map: chapter id → true/false
let speeds = [0.8, 1.0, 1.2, 1.5];
let spdIdx = 1;
let ttsUtterance = null;
let ttsActive = false;
let ttsParagraph = 0;

// Check TTS availability
const hasTTS = 'speechSynthesis' in window;

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function enterApp() {
  document.getElementById('splash').classList.add('out');
  preCheckAudio();
  buildChapterList();
  loadChapter(0);
  bindAudioEvents();
}

function preCheckAudio() {
  // Silently test if each MP3 exists via HEAD-like check
  CHAPTERS.forEach(ch => {
    const url = AUDIO_BASE + ch.audio;
    const tester = new Audio();
    tester.addEventListener('canplaythrough', () => {
      audioAvailable[ch.id] = true;
      updateChapterAudioBadge(ch.id, true);
    }, { once: true });
    tester.addEventListener('error', () => {
      audioAvailable[ch.id] = false;
      updateChapterAudioBadge(ch.id, false);
    }, { once: true });
    tester.src = url;
    tester.preload = 'metadata';
  });
}

function bindAudioEvents() {
  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('ended', onAudioEnded);
  audio.addEventListener('play', () => { setPlayState(true); });
  audio.addEventListener('pause', () => { if (!audio.ended) setPlayState(false); });
  audio.addEventListener('error', onAudioError);
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('time-tot').textContent = formatTime(audio.duration);
  });
}

// ═══════════════════════════════════════════════════════════
// CHAPTER LIST
// ═══════════════════════════════════════════════════════════
function buildChapterList() {
  const list = document.getElementById('ch-list');
  list.innerHTML = '';
  CHAPTERS.forEach((ch, i) => {
    const el = document.createElement('div');
    el.className = 'ch-item' + (i === 0 ? ' active' : '');
    el.id = 'chi-' + ch.id;
    el.innerHTML = `
      <div class="ci-num">${ch.num}</div>
      <div class="ci-title">${ch.title}</div>
      ${ch.year ? `<div class="ci-year">${ch.year}</div>` : ''}
      <div class="ci-status" id="ci-st-${ch.id}">⏳ Verifica audio…</div>`;
    el.onclick = () => selectChapter(i);
    list.appendChild(el);
  });
}

function updateChapterAudioBadge(id, available) {
  const el = document.getElementById('ci-st-' + id);
  if (!el) return;
  if (available) {
    el.textContent = '🔊 Audio ElevenLabs disponibile';
    el.style.color = '#c8972a';
    document.getElementById('chi-' + id)?.classList.add('has-audio');
  } else {
    el.textContent = '🔤 Voce sintetizzata (MP3 non caricato)';
    el.style.color = '#7a5c18';
  }
}

function selectChapter(idx) {
  stopAll();
  loadChapter(idx);
  togglePanel();
}

function togglePanel() {
  document.getElementById('chapter-panel').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════
// LOAD CHAPTER
// ═══════════════════════════════════════════════════════════
function loadChapter(idx) {
  curChapter = idx;
  isPlaying = false;
  ttsParagraph = 0;
  updatePlayBtn();

  document.querySelectorAll('.ch-item').forEach((el, i) => el.classList.toggle('active', i === idx));

  const ch = CHAPTERS[idx];
  const content = document.getElementById('text-content');
  content.innerHTML = '';

  // Heading
  const hd = document.createElement('div');
  hd.className = 'ch-heading';
  hd.innerHTML = `<div class="lbl">${ch.num}</div><h1>${ch.title}</h1>${ch.year ? `<div class="yr">${ch.year}</div>` : ''}`;
  content.appendChild(hd);

  // Audio notice
  const hasAudio = audioAvailable[ch.id];
  if (hasAudio === false) {
    const notice = document.createElement('div');
    notice.className = 'audio-missing-notice';
    notice.innerHTML = `<span class="ico">🎙</span><span>L'audio ElevenLabs per questo capitolo non è ancora stato caricato.<br>In riproduzione: voce sintetizzata del dispositivo.</span>`;
    content.appendChild(notice);
  }

  // Paragraphs
  ch.paragraphs.forEach((p, i) => {
    const el = document.createElement('p');
    el.className = 'para ' + p.type;
    if (i === 0 && p.type === 'prose') el.classList.add('drop-cap');
    el.id = 'p-' + i;
    el.textContent = p.text;
    content.appendChild(el);
  });

  // Reset sync map per il nuovo capitolo
  syncMap = [];
  lastHighlightIdx = -1;

  // Player info
  document.getElementById('p-title').textContent = ch.title;
  document.getElementById('p-mode').textContent =
    audioAvailable[ch.id] ? '🔊 Audio ElevenLabs' : (hasTTS ? '🔤 Voce sintetizzata' : '📖 Solo lettura');

  // Load audio if available
  if (audioAvailable[ch.id]) {
    audio.src = AUDIO_BASE + ch.audio;
    audio.load();
    document.getElementById('time-tot').textContent = '--:--';
  } else {
    audio.src = '';
  }

  updateProgress(0);
  document.getElementById('reader').scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
// PLAYBACK — REAL AUDIO
// ═══════════════════════════════════════════════════════════
function togglePlay() {
  // Usa SOLO l'audio MP3 — nessun TTS fallback
  if (!audio.src || audio.src === window.location.href) {
    // Audio non ancora caricato, prova a ricaricare il capitolo corrente
    const ch = CHAPTERS[curChapter];
    audio.src = AUDIO_BASE + ch.audio;
    audio.load();
    setTimeout(() => {
      audio.playbackRate = speeds[spdIdx];
      audio.play().catch(onAudioError);
    }, 300);
  } else if (audio.paused) {
    audio.playbackRate = speeds[spdIdx];
    audio.play().catch(onAudioError);
  } else {
    audio.pause();
  }
}

function skip(sec) {
  const ch = CHAPTERS[curChapter];
  if (audioAvailable[ch.id] && audio.src) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
  }
}

function onTimeUpdate() {
  const t = audio.currentTime;
  const d = audio.duration || 0;
  updateProgress(d > 0 ? t / d : 0);
  document.getElementById('time-cur').textContent = formatTime(t);
  if (d > 0) document.getElementById('time-tot').textContent = formatTime(d);
  // Sync text highlight roughly
  syncTextToAudio(t, d);
}

function onAudioEnded() {
  setPlayState(false);
  clearHighlight();
  // Auto-advance
  if (curChapter < CHAPTERS.length - 1) {
    setTimeout(() => { loadChapter(curChapter + 1); startOrAdvice(); }, 1000);
  }
}

function startOrAdvice() {
  const ch = CHAPTERS[curChapter];
  if (audioAvailable[ch.id]) {
    audio.playbackRate = speeds[spdIdx];
    audio.play().catch(() => {});
  }
}

function onAudioError() {
  // Non avviare TTS — mostra solo messaggio di errore
  setPlayState(false);
  document.getElementById('p-mode').textContent = '⚠️ Audio non disponibile';
}

function seekClick(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const ch = CHAPTERS[curChapter];
  if (audioAvailable[ch.id] && audio.duration) {
    audio.currentTime = ratio * audio.duration;
  }
}

// Sincronizzazione testo-audio proporzionale alla lunghezza dei paragrafi
function buildSyncMap(chapterIdx) {
  const ch = CHAPTERS[chapterIdx];
  const paras = ch.paragraphs;
  // Calcola peso di ogni paragrafo in base alla lunghezza del testo
  const lengths = paras.map(p => p.text.length);
  const total = lengths.reduce((a, b) => a + b, 0);
  // Costruisce array di soglie: a che frazione del tempo inizia ogni paragrafo
  let cumulative = 0;
  const thresholds = lengths.map(l => {
    const t = cumulative / total;
    cumulative += l;
    return t;
  });
  return thresholds;
}

let syncMap = [];
let lastHighlightIdx = -1;

function syncTextToAudio(t, d) {
  if (!d || d === 0) return;
  if (syncMap.length === 0) syncMap = buildSyncMap(curChapter);

  const progress = t / d;
  const ch = CHAPTERS[curChapter];
  const n = ch.paragraphs.length;

  // Trova l'ultimo paragrafo la cui soglia è <= progress corrente
  let pIdx = 0;
  for (let i = 0; i < syncMap.length; i++) {
    if (syncMap[i] <= progress) pIdx = i;
    else break;
  }
  pIdx = Math.min(pIdx, n - 1);

  if (pIdx !== lastHighlightIdx) {
    lastHighlightIdx = pIdx;
    highlightPara(pIdx);
    scrollToPara(pIdx);
  }
}

// ═══════════════════════════════════════════════════════════
// PLAYBACK — TTS FALLBACK
// ═══════════════════════════════════════════════════════════
function startTTS() {
  if (!hasTTS) return;
  ttsActive = true;
  setPlayState(true);
  speakPara(ttsParagraph);
}

function pauseTTS() {
  ttsActive = false;
  speechSynthesis.cancel();
  setPlayState(false);
}

function speakPara(idx) {
  const ch = CHAPTERS[curChapter];
  if (idx >= ch.paragraphs.length) {
    ttsActive = false;
    setPlayState(false);
    clearHighlight();
    if (curChapter < CHAPTERS.length - 1) {
      setTimeout(() => { loadChapter(curChapter + 1); startTTS(); }, 1200);
    }
    return;
  }
  ttsParagraph = idx;
  highlightPara(idx);
  scrollToPara(idx);

  // Fake progress
  const n = ch.paragraphs.length;
  updateProgress(idx / n);
  document.getElementById('time-cur').textContent = `§ ${idx + 1}/${n}`;

  const utt = new SpeechSynthesisUtterance(ch.paragraphs[idx].text);
  utt.lang = 'it-IT';
  utt.rate = speeds[spdIdx];
  const voices = speechSynthesis.getVoices();
  const itVoice = voices.find(v => v.lang.startsWith('it') && v.localService) || voices.find(v => v.lang.startsWith('it'));
  if (itVoice) utt.voice = itVoice;
  utt.onend = () => { if (ttsActive) speakPara(idx + 1); };
  utt.onerror = () => { if (ttsActive) speakPara(idx + 1); };
  ttsUtterance = utt;
  speechSynthesis.speak(utt);
}

function stopAll() {
  isPlaying = false;
  audio.pause();
  if (hasTTS) speechSynthesis.cancel();
  ttsActive = false;
  lastHighlightIdx = -1;
  setPlayState(false);
  clearHighlight();
}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function setPlayState(playing) {
  isPlaying = playing;
  updatePlayBtn();
  document.getElementById('play-dot').classList.toggle('on', playing);
}

function updatePlayBtn() {
  document.getElementById('play-icon').textContent = isPlaying ? '⏸' : '▶';
}

function highlightPara(idx) {
  clearHighlight();
  document.getElementById('p-' + idx)?.classList.add('speaking');
}

function clearHighlight() {
  document.querySelectorAll('.para.speaking').forEach(e => e.classList.remove('speaking'));
}

function scrollToPara(idx) {
  document.getElementById('p-' + idx)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateProgress(ratio) {
  document.getElementById('prog-bar').style.width = (ratio * 100) + '%';
  document.getElementById('btn-play').style.setProperty('--play-prog', (ratio * 100) + '%');
}

function cycleSpeed() {
  spdIdx = (spdIdx + 1) % speeds.length;
  const s = speeds[spdIdx];
  document.getElementById('btn-spd').textContent = s + '×';
  if (!audio.paused) audio.playbackRate = s;
  if (ttsActive) { pauseTTS(); setTimeout(startTTS, 80); }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}
</script>
